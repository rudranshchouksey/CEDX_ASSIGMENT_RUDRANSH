<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEDX Governance - Operator SPA</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0b0f19',
                        surface: 'rgba(20, 26, 40, 0.6)',
                        surfaceBorder: 'rgba(255, 255, 255, 0.08)',
                        accent: '#3b82f6',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
        }

        .glass-panel {
            background: var(--surface, rgba(20, 26, 40, 0.6));
            border: 1px solid var(--surfaceBorder, rgba(255, 255, 255, 0.08));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Timeline Connector */
        .timeline-connector::before {
            content: '';
            position: absolute;
            left: 15px; /* Adjust based on icon width / 2 */
            top: 32px;
            bottom: -16px;
            width: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        .timeline-item:last-child .timeline-connector::before {
            display: none;
        }

        /* Toggle switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10b981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981;
        }
        
        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        .toast-exit {
            animation: fadeOut 0.3s ease-in forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(10px); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 lg:p-8 flex flex-col font-sans">

    <!-- Top Navigation & Live Metrics Bar -->
    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4 pb-6 border-b border-white/10">
        <div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                CEDX Operator SPA
            </h1>
            <p class="text-slate-400 text-sm mt-1" id="sys-case">CASE_ID: <span class="font-mono text-accent">...</span></p>
        </div>

        <div class="flex flex-wrap gap-4 items-center w-full lg:w-auto">
            <!-- Metrics -->
            <div class="glass-panel px-4 py-2 rounded-xl flex flex-col items-center">
                <span class="text-xs text-slate-400 uppercase tracking-wider">Role</span>
                <span class="font-bold text-white" id="metric-role">...</span>
            </div>
            <div class="glass-panel px-4 py-2 rounded-xl flex flex-col items-center">
                <span class="text-xs text-slate-400 uppercase tracking-wider">Threshold</span>
                <span class="font-bold text-white" id="metric-threshold">...</span>
            </div>
            <div class="glass-panel px-4 py-2 rounded-xl flex flex-col items-center">
                <span class="text-xs text-slate-400 uppercase tracking-wider">Avg Cost</span>
                <span class="font-bold text-white" id="metric-avg-cost">...</span>
            </div>
            <div class="glass-panel px-4 py-2 rounded-xl flex flex-col items-center">
                <span class="text-xs text-slate-400 uppercase tracking-wider">p95 Latency</span>
                <span class="font-bold text-white" id="metric-latency">...</span>
            </div>

            <!-- Toggle Replay -->
            <div class="glass-panel px-4 py-2 rounded-xl flex items-center gap-3 h-full">
                <span class="text-sm font-medium text-slate-300">Live</span>
                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="replay-toggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 left-0 top-0 z-10" onclick="toggleReplay()"/>
                    <label for="replay-toggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-600 cursor-pointer transition-colors duration-300"></label>
                </div>
                <span class="text-sm font-medium text-slate-300">Replay</span>
            </div>
        </div>
    </header>

    <!-- Main Dual-Pane Layout -->
    <main class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-160px)]">
        
        <!-- Left Pane: Ingestion Queue (Master) -->
        <section class="lg:col-span-5 glass-panel rounded-2xl flex flex-col overflow-hidden h-full">
            <div class="p-4 border-b border-white/10 flex justify-between items-center bg-white/5">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    Master Queue
                </h2>
                <span class="text-xs text-slate-400 bg-black/30 px-2 py-1 rounded-full"><span id="queue-count">0</span> items</span>
            </div>
            
            <!-- Filters -->
            <div class="p-3 bg-black/20 flex gap-2 overflow-x-auto no-scrollbar">
                <button onclick="filterQueue('all')" class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-accent text-white transition">All</button>
                <button onclick="filterQueue('in_review')" class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-white/10 text-slate-300 hover:bg-white/20 transition">In Review</button>
                <button onclick="filterQueue('exception')" class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-white/10 text-slate-300 hover:bg-white/20 transition text-danger">Exceptions</button>
            </div>

            <div class="overflow-y-auto flex-grow p-2 space-y-2" id="record-list">
                <!-- Records injected here -->
                <div class="text-center py-10 text-slate-500">Loading queue...</div>
            </div>
        </section>

        <!-- Right Pane: Observability Inspector (Detail) -->
        <section class="lg:col-span-7 glass-panel rounded-2xl flex flex-col overflow-hidden h-full relative" id="inspector-pane">
            
            <div class="absolute inset-0 flex items-center justify-center bg-black/40 z-10" id="inspector-empty">
                <div class="text-center text-slate-500">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    <p>Select a record to inspect observability traces.</p>
                </div>
            </div>

            <div class="p-4 border-b border-white/10 bg-white/5 flex justify-between items-start">
                <div>
                    <h2 class="text-xl font-bold font-mono text-accent" id="detail-id">REC-000</h2>
                    <div class="flex gap-2 mt-2" id="detail-badges">
                        <!-- Badges -->
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-2xl font-bold" id="detail-amount">$0.00</div>
                    <div class="text-sm text-slate-400">Total Value</div>
                </div>
            </div>

            <div class="flex-grow overflow-y-auto p-6 flex flex-col gap-6">
                
                <!-- Lineage Card -->
                <div class="bg-black/30 rounded-xl p-4 border border-white/5">
                    <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wide mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        Record Lineage
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="lineage-grid">
                        <!-- Lineage Details -->
                    </div>
                </div>

                <!-- Trace Timeline -->
                <div class="">
                    <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wide mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        Multi-Agent Trace
                    </h3>
                    <div class="pl-2" id="trace-timeline">
                        <!-- Spans injected here -->
                    </div>
                </div>

            </div>

            <!-- HIL Operator Action Bar -->
            <div class="p-4 bg-black/40 border-t border-white/10 backdrop-blur-md">
                <div class="flex flex-col md:flex-row gap-4 items-center">
                    <div class="w-full md:w-1/3">
                        <label class="block text-xs text-slate-400 mb-1">Simulated Operator Role</label>
                        <select id="operator-role" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-accent">
                            <option value="intern">Intern (Unauthorized)</option>
                            <option value="risk_officer">Risk Officer</option>
                            <option value="legal_counsel">Legal Counsel</option>
                            <option value="compliance">Compliance</option>
                            <option value="finance_controller">Finance Controller</option>
                        </select>
                    </div>
                    <div class="flex-grow flex gap-2 w-full md:w-auto pt-5">
                        <button onclick="dispatchAction('request_changes')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium py-2 px-4 rounded-lg transition">Request Changes</button>
                        <button onclick="dispatchAction('approve')" class="flex-1 bg-accent hover:bg-blue-600 text-white text-sm font-medium py-2 px-4 rounded-lg transition">Approve Override</button>
                        <button onclick="dispatchAction('deliver')" class="flex-1 bg-success hover:bg-emerald-600 text-white text-sm font-medium py-2 px-4 rounded-lg transition shadow-[0_0_15px_rgba(16,185,129,0.3)]">Deliver</button>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <!-- Toaster -->
    <div id="toaster" class="fixed bottom-6 right-6 flex flex-col gap-3 z-50 pointer-events-none"></div>

    <!-- Scripts -->
    <script>
        let globalState = {
            records: [],
            currentFilter: 'all',
            selectedRecord: null,
            threshold: 0,
            reqRole: ''
        };

        // UI Helpers
        const getBadgeStyle = (state) => {
            const styles = {
                'draft': 'bg-slate-500/20 text-slate-400 border border-slate-500/30',
                'in_review': 'bg-blue-500/20 text-blue-400 border border-blue-500/30',
                'changes_requested': 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30',
                'approved': 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
                'delivered': 'bg-emerald-600/30 text-emerald-300 border border-emerald-500/50',
                'exception': 'bg-red-500/20 text-red-400 border border-red-500/30'
            };
            return styles[state] || styles['draft'];
        };

        const showToast = (type, title, message) => {
            const toaster = document.getElementById('toaster');
            const toast = document.createElement('div');
            const icon = type === 'error' 
                ? `<svg class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`
                : `<svg class="w-6 h-6 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            
            const borderColor = type === 'error' ? 'border-red-500/50' : 'border-emerald-500/50';
            
            toast.className = `glass-panel ${borderColor} border p-4 rounded-xl shadow-2xl flex gap-3 max-w-sm toast-enter pointer-events-auto`;
            toast.innerHTML = `
                <div class="mt-0.5">${icon}</div>
                <div>
                    <h4 class="text-sm font-bold text-white">${title}</h4>
                    <p class="text-xs text-slate-300 mt-1">${message}</p>
                </div>
            `;
            
            toaster.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        };

        // Data Fetching
        async function fetchDashboardData() {
            try {
                // Status
                const resStatus = await fetch('/api/status');
                const status = await resStatus.json();
                
                if (status.status !== 'uninitialized') {
                    document.getElementById('sys-case').innerHTML = `CASE_ID: <span class="font-mono text-accent">${status.case_id}</span>`;
                    document.getElementById('metric-role').innerText = status.role;
                    document.getElementById('metric-threshold').innerText = `$${status.threshold.toLocaleString()}`;
                    document.getElementById('metric-avg-cost').innerText = `$${status.avg_cost.toFixed(4)}`;
                    document.getElementById('metric-latency').innerText = `${status.p95_latency.toFixed(1)}ms`;
                    document.getElementById('replay-toggle').checked = status.replay_llm;
                    
                    globalState.threshold = status.threshold;
                    globalState.reqRole = status.role;
                }

                // Records
                const resRecords = await fetch('/api/records');
                globalState.records = await resRecords.json();
                
                renderQueue();
            } catch (err) {
                console.error(err);
                showToast('error', 'Connection Error', 'Failed to fetch dashboard telemetry.');
            }
        }

        // Render Functions
        function filterQueue(filter) {
            globalState.currentFilter = filter;
            
            // Update filter buttons styling
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = 'filter-btn px-3 py-1 rounded-full text-xs font-medium transition cursor-pointer ' + 
                    (btn.innerText.toLowerCase().includes(filter === 'in_review' ? 'review' : filter) || (filter==='exception' && btn.innerText.includes('Exception')) || (filter==='all' && btn.innerText==='All')
                    ? 'bg-accent text-white' 
                    : 'bg-white/10 text-slate-300 hover:bg-white/20');
            });
            
            renderQueue();
        }

        function renderQueue() {
            const list = document.getElementById('record-list');
            list.innerHTML = '';
            
            let filtered = globalState.records;
            if (globalState.currentFilter === 'in_review') {
                filtered = filtered.filter(r => r.state === 'in_review');
            } else if (globalState.currentFilter === 'exception') {
                filtered = filtered.filter(r => r.reason_codes && r.reason_codes.length > 0);
            }
            
            document.getElementById('queue-count').innerText = filtered.length;

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-500 text-sm">No records found.</div>`;
                return;
            }

            filtered.forEach(r => {
                const isException = r.reason_codes && r.reason_codes.length > 0;
                const isSelected = globalState.selectedRecord === r.id;
                
                const card = document.createElement('div');
                card.className = `p-3 rounded-xl cursor-pointer transition-all border ${isSelected ? 'bg-white/10 border-accent/50' : 'bg-black/20 border-transparent hover:bg-white/5'} flex flex-col gap-2`;
                card.onclick = () => selectRecord(r.id);
                
                let reasonHtml = '';
                if (isException) {
                    const firstReason = r.reason_codes[0];
                    const isAgent = firstReason.includes("AGENT");
                    reasonHtml = `<div class="text-[10px] uppercase font-bold px-2 py-0.5 rounded ${isAgent ? 'bg-orange-500/20 text-orange-400' : 'bg-red-500/20 text-red-400'} inline-block truncate w-full" title="${firstReason}">
                        <svg class="w-3 h-3 inline pb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        ${firstReason.split(':')[0]}
                    </div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-mono text-sm font-bold text-white">${r.id}</span>
                        <span class="text-sm font-medium">$${r.amount.toLocaleString()}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs px-2 py-0.5 rounded-full ${getBadgeStyle(r.state)}">${r.state}</span>
                    </div>
                    ${reasonHtml}
                `;
                list.appendChild(card);
            });
        }

        async function selectRecord(id) {
            globalState.selectedRecord = id;
            renderQueue(); // Update selection highlight
            
            document.getElementById('inspector-empty').style.display = 'none';
            
            try {
                const res = await fetch(`/api/records/${id}`);
                const record = await res.json();
                
                document.getElementById('detail-id').innerText = record.id;
                document.getElementById('detail-amount').innerText = `$${record.amount.toLocaleString()}`;
                
                const badges = document.getElementById('detail-badges');
                badges.innerHTML = `<span class="text-xs px-2 py-1 rounded-md ${getBadgeStyle(record.state)} uppercase tracking-wider font-semibold">${record.state}</span>`;
                if (record.reason_codes) {
                    record.reason_codes.forEach(rc => {
                        badges.innerHTML += `<span class="text-xs px-2 py-1 rounded-md bg-red-500/20 text-red-400 border border-red-500/30 truncate max-w-[200px]" title="${rc}">${rc.split(':')[0]}</span>`;
                    });
                }
                
                // Lineage
                const lg = record.lineage || {};
                document.getElementById('lineage-grid').innerHTML = `
                    <div><div class="text-[10px] text-slate-500 uppercase">Owner</div><div class="text-sm font-medium">${lg.owner || 'N/A'}</div></div>
                    <div><div class="text-[10px] text-slate-500 uppercase">Format</div><div class="text-sm font-medium font-mono">${lg.source_format || 'N/A'}</div></div>
                    <div><div class="text-[10px] text-slate-500 uppercase">Deadline</div><div class="text-sm font-medium">${lg.deadline || 'N/A'}</div></div>
                    <div><div class="text-[10px] text-slate-500 uppercase">Hash</div><div class="text-sm font-medium font-mono text-accent truncate" title="${lg.source_hash}">${lg.source_hash || 'N/A'}</div></div>
                `;

                // Traces
                const timeline = document.getElementById('trace-timeline');
                timeline.innerHTML = '';
                
                if (!record.agent_trace || record.agent_trace.length === 0) {
                    timeline.innerHTML = `<div class="text-slate-500 text-sm">No agent traces logged.</div>`;
                } else {
                    record.agent_trace.forEach((span, i) => {
                        const isFail = span.verdict === 'FAIL';
                        const iconBg = isFail ? 'bg-red-500/20 border-red-500/50' : 'bg-blue-500/20 border-blue-500/50';
                        const iconColor = isFail ? 'text-red-400' : 'text-blue-400';
                        
                        const el = document.createElement('div');
                        el.className = `relative pl-10 pb-6 timeline-item timeline-connector`;
                        
                        el.innerHTML = `
                            <div class="absolute left-0 top-0 w-8 h-8 rounded-full border ${iconBg} flex items-center justify-center z-10 bg-[#0b0f19]">
                                <svg class="w-4 h-4 ${iconColor}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                                </svg>
                            </div>
                            <div class="bg-black/30 rounded-xl p-4 border ${isFail ? 'border-red-500/30' : 'border-white/5'}">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-sm font-bold text-white uppercase tracking-wider">${span.agent}</span>
                                    <span class="text-xs font-mono bg-white/5 px-2 py-1 rounded text-slate-300">${span.model}</span>
                                </div>
                                <div class="grid grid-cols-3 gap-2 mt-3 text-xs text-slate-400">
                                    <div><span class="block uppercase text-[9px] text-slate-500">Tokens</span><span class="font-mono text-white">${span.tokens_in} IN / ${span.tokens_out} OUT</span></div>
                                    <div><span class="block uppercase text-[9px] text-slate-500">Latency</span><span class="font-mono text-white">${span.latency_ms}ms</span></div>
                                    <div><span class="block uppercase text-[9px] text-slate-500">Cost</span><span class="font-mono text-white">$${span.cost_usd.toFixed(5)}</span></div>
                                </div>
                                ${isFail ? `<div class="mt-3 p-2 bg-red-500/10 border border-red-500/20 rounded-lg text-xs text-red-300">${span.issues.join('<br>')}</div>` : ''}
                            </div>
                        `;
                        timeline.appendChild(el);
                    });
                }
                
            } catch (err) {
                console.error(err);
                showToast('error', 'Fetch Error', 'Failed to load record details.');
            }
        }

        // Actions
        async function toggleReplay() {
            const toggle = document.getElementById('replay-toggle');
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ replay_llm: toggle.checked })
                });
                showToast('success', 'Settings Updated', `REPLAY_LLM set to ${toggle.checked}`);
            } catch (err) {
                toggle.checked = !toggle.checked;
                showToast('error', 'Update Failed', 'Could not save settings.');
            }
        }

        async function dispatchAction(actionStr) {
            if (!globalState.selectedRecord) {
                return showToast('error', 'Action Blocked', 'Please select a record from the master queue first.');
            }
            
            const role = document.getElementById('operator-role').value;
            
            // Client-side guardrail simulation
            const record = globalState.records.find(r => r.id === globalState.selectedRecord);
            if (actionStr === 'deliver' && record && record.amount >= globalState.threshold) {
                if (role !== globalState.reqRole) {
                    // Pre-emptive prompt, but we still send to backend to let backend throw 403 officially
                    console.warn(`Client-side Guardrail: High value payload ($${record.amount}) detected. Requesting required role '${globalState.reqRole}'... Proceeding to hit API.`);
                }
            }

            try {
                const res = await fetch('/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        record_id: globalState.selectedRecord,
                        actor_role: role,
                        action: actionStr
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    showToast('success', 'Action Applied', `Successfully moved ${globalState.selectedRecord} to state: ${data.record.state}`);
                    await fetchDashboardData();
                    selectRecord(globalState.selectedRecord); // Refresh inspector
                } else {
                    // Catch 403 Forbidden etc
                    if (res.status === 403) {
                        showToast('error', '403 Forbidden (Live Amendment Gate)', data.detail || 'Insufficient operator authority for delivery.');
                    } else {
                        showToast('error', 'Validation Error', data.detail || 'The request was rejected.');
                    }
                }
            } catch (err) {
                showToast('error', 'Network Error', 'Failed to dispatch action.');
            }
        }

        // Init
        fetchDashboardData();
        setInterval(fetchDashboardData, 5000); // Polling for updates
    </script>
</body>
</html>
